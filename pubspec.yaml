name: sizesync
description: "Offline-first clothing size converter by brands."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.17
  freezed_annotation: ^2.4.4
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  purchases_flutter: ^8.4.0
  riverpod_annotation: ^2.6.1
  smooth_page_indicator: ^1.2.0+3

dev_dependencies:
  build_runner: ^2.4.14
  custom_lint: ^0.7.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.1
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/brands.json
    - assets/data/categories.json
    - assets/data/size_charts/
