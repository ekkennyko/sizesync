flutter_native_splash:
  color: "#2E7D32"
  image: assets/splash/logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#2E7D32"
    image: assets/splash/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

name: sizesync
description: "Offline-first clothing size converter by brands."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.17
  freezed_annotation: ^2.4.4
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  in_app_review: ^2.0.9
  path_provider: ^2.1.5
  purchases_flutter: ^8.4.0
  share_plus: ^10.1.4
  smooth_page_indicator: ^1.2.0+3
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.2
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/brands.json
    - assets/data/categories.json
    - assets/data/size_charts/
